name: e2e-checksum

on:
  push:
    branches:
      - main
    paths:
      - "web_src/wasm/gitea-crypto/**"
      - "public/assets/wasm/**"
      - ".github/workflows/e2e-checksum.yml"
    tags:
      - "v*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-checksum:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build WASM module
        run: |
          cd web_src/wasm/gitea-crypto
          wasm-pack build --target web --release --out-dir ../../../public/assets/wasm

      - name: Compute checksums
        id: checksums
        run: |
          WASM_FILE="public/assets/wasm/gitea_crypto_bg.wasm"
          JS_FILE="public/assets/wasm/gitea_crypto.js"

          WASM_SHA256=$(sha256sum "$WASM_FILE" | cut -d' ' -f1)
          JS_SHA256=$(sha256sum "$JS_FILE" | cut -d' ' -f1)
          WASM_SIZE=$(stat -c%s "$WASM_FILE")

          echo "wasm_sha256=$WASM_SHA256" >> "$GITHUB_OUTPUT"
          echo "js_sha256=$JS_SHA256" >> "$GITHUB_OUTPUT"
          echo "wasm_size=$WASM_SIZE" >> "$GITHUB_OUTPUT"

      - name: Create checksum branch if missing
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Check if the checksum branch exists on the remote
          if ! git ls-remote --exit-code --heads origin checksum >/dev/null 2>&1; then
            echo "Creating orphan checksum branch..."
            # Create it via the GitHub API — push an initial commit with just a README
            echo '# E2E Encryption WASM Checksums

          Each file is named by commit SHA or tag name.
          Verification: https://giteachecksums.krnl64.win' > /tmp/readme_content.txt

            README_B64=$(base64 -w0 /tmp/readme_content.txt)

            # Create a blob
            BLOB_SHA=$(gh api repos/${{ github.repository }}/git/blobs \
              -f content="$README_B64" -f encoding="base64" --jq '.sha')

            # Create a tree with just the README
            TREE_SHA=$(gh api repos/${{ github.repository }}/git/trees \
              --input <(printf '{"tree":[{"path":"README.md","mode":"100644","type":"blob","sha":"%s"}]}' "$BLOB_SHA") \
              --jq '.sha')

            # Create a commit (no parent = orphan)
            COMMIT_SHA=$(gh api repos/${{ github.repository }}/git/commits \
              --input <(printf '{"message":"init: checksum branch","tree":"%s","parents":[]}' "$TREE_SHA") \
              --jq '.sha')

            # Create the ref
            gh api repos/${{ github.repository }}/git/refs \
              --input <(printf '{"ref":"refs/heads/checksum","sha":"%s"}' "$COMMIT_SHA")

            echo "Checksum branch created at $COMMIT_SHA"
          fi

      - name: Prepare checksum files
        run: |
          # Fetch the checksum branch and check it out
          git fetch origin checksum
          git checkout checksum

          BUILT_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          # Write checksum file named by commit SHA
          printf '{\n  "commit": "%s",\n  "ref": "%s",\n  "ref_name": "%s",\n  "wasm_sha256": "%s",\n  "js_sha256": "%s",\n  "wasm_size": %s,\n  "built_at": "%s",\n  "workflow_run": "%s"\n}\n' \
            "${{ github.sha }}" "${{ github.ref }}" "${{ github.ref_name }}" \
            "${{ steps.checksums.outputs.wasm_sha256 }}" "${{ steps.checksums.outputs.js_sha256 }}" \
            "${{ steps.checksums.outputs.wasm_size }}" "$BUILT_AT" \
            "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            > "${{ github.sha }}"

          # For tags, also create tag-named file and latest pointer
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            cp "${{ github.sha }}" "${{ github.ref_name }}"
            cp "${{ github.sha }}" "latest"
          fi

      - name: Commit checksums
        uses: siiway/verified_bot_commit@v0
        with:
          ref: refs/heads/checksum
          message: |
            checksum: ${{ github.sha }}

            wasm_sha256: ${{ steps.checksums.outputs.wasm_sha256 }}
            js_sha256: ${{ steps.checksums.outputs.js_sha256 }}
            source_commit: ${{ github.sha }}
            source_ref: ${{ github.ref }}
          files: |
            ${{ github.sha }}
            ${{ github.ref_type == 'tag' && github.ref_name || '' }}
            ${{ github.ref_type == 'tag' && 'latest' || '' }}
            README.md
