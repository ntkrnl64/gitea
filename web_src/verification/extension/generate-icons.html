<!-- Open this file in a browser, right-click the canvases, and save as PNG -->
<!-- Or use any tool to convert the SVG to 48x48 and 128x128 PNGs -->
<canvas id="c48" width="48" height="48"></canvas>
<canvas id="c128" width="128" height="128"></canvas>
<script>
function drawIcon(canvas) {
  const s = canvas.width;
  const ctx = canvas.getContext('2d');
  // Background
  ctx.fillStyle = '#1a1a2e';
  ctx.beginPath();
  ctx.roundRect(0, 0, s, s, s * 0.15);
  ctx.fill();
  // Shield
  const cx = s / 2, cy = s * 0.48, r = s * 0.32;
  ctx.fillStyle = '#28a745';
  ctx.beginPath();
  ctx.moveTo(cx, cy - r);
  ctx.lineTo(cx + r * 0.9, cy - r * 0.4);
  ctx.lineTo(cx + r * 0.7, cy + r * 0.8);
  ctx.lineTo(cx, cy + r);
  ctx.lineTo(cx - r * 0.7, cy + r * 0.8);
  ctx.lineTo(cx - r * 0.9, cy - r * 0.4);
  ctx.closePath();
  ctx.fill();
  // Lock
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = s * 0.04;
  const lx = cx, ly = cy + s * 0.02, lr = s * 0.1;
  ctx.beginPath();
  ctx.arc(lx, ly - lr * 0.5, lr * 0.6, Math.PI, 0);
  ctx.stroke();
  ctx.fillStyle = '#fff';
  ctx.fillRect(lx - lr, ly, lr * 2, lr * 1.4);
}
drawIcon(document.getElementById('c48'));
drawIcon(document.getElementById('c128'));
</script>
